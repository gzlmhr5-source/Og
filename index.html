<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahçesaray ÇPAL Ailesi - Öğretmenlerimize Saygı</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ana-renk: #1a2a6c;
            --altin: #b4941f;
            --beyaz: #ffffff;
            --gri: #f4f7f6;
            --kirmizi: #e74c3c;
            --mavi: #3498db;
            --yesil: #27ae60;
            --koyu-bg: #0f1419;
            --koyu-card: #1a1f2e;
            --koyu-text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gri);
            color: #2d3436;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: var(--koyu-bg);
            color: var(--koyu-text);
        }

        body.dark-mode .photo-card {
            background: var(--koyu-card);
        }

        body.dark-mode .info h3 {
            color: #fff;
        }

        body.dark-mode .message-box {
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.2), rgba(52, 152, 219, 0.2));
        }

        body.dark-mode footer {
            background: linear-gradient(135deg, #0a0d12, #1a2a6c);
        }

        /* TEMA SEÇİCİ */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            gap: 10px;
            background: var(--beyaz);
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: slideInRight 0.5s ease-out;
        }

        body.dark-mode .theme-switcher {
            background: var(--koyu-card);
        }

        .theme-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 8px 12px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .theme-btn:hover {
            background: rgba(52, 152, 219, 0.2);
            transform: scale(1.1);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* HIZLI ERIŞIM MENÜSÜ */
        .quick-menu {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: slideInLeft 0.5s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .quick-menu a {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--ana-renk), var(--mavi));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(26, 42, 108, 0.3);
            transition: all 0.3s;
            text-decoration: none;
        }

        .quick-menu a:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(26, 42, 108, 0.5);
        }

        body.dark-mode .quick-menu a {
            background: linear-gradient(135deg, var(--mavi), var(--altin));
        }

        /* YUKARIYA ÇIK BUTONU */
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--ana-renk), var(--mavi));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(26, 42, 108, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 998;
        }

        .scroll-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .scroll-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(26, 42, 108, 0.5);
        }

        /* ARA ÇUBUĞU */
        .search-container {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border: 2px solid var(--ana-renk);
            border-radius: 50px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: var(--beyaz);
        }

        body.dark-mode .search-box {
            background: var(--koyu-card);
            border-color: var(--mavi);
            color: var(--koyu-text);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--mavi);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
            transform: scale(1.02);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ana-renk);
        }

        body.dark-mode .search-icon {
            color: var(--mavi);
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, rgba(26, 42, 108, 0.95), rgba(52, 152, 219, 0.9)), url('okul.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            padding: 120px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,50 Q300,100 600,50 T1200,50 L1200,120 L0,120 Z" fill="rgba(255,255,255,0.1)"/></svg>');
            background-repeat: repeat-x;
            animation: wave 15s linear infinite;
            opacity: 0.3;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(1200px); }
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
            position: relative;
            z-index: 1;
        }

        header .subtitle {
            font-size: 1.3rem;
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.95;
            animation: fadeInUp 1.2s ease-out;
            position: relative;
            z-index: 1;
        }

        header .dedication {
            font-size: 0.95rem;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--altin);
            border-radius: 5px;
            animation: fadeInUp 1.4s ease-out;
            position: relative;
            z-index: 1;
            font-style: italic;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            text-align: center;
            margin: 70px 0 40px;
            font-family: 'Playfair Display', serif;
            color: var(--ana-renk);
            font-size: 2.2rem;
            position: relative;
            padding-bottom: 20px;
        }

        body.dark-mode .section-title {
            color: var(--altin);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--altin), transparent);
            animation: expandWidth 0.8s ease-out;
        }

        @keyframes expandWidth {
            from { width: 0; }
            to { width: 100px; }
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .photo-card {
            background: var(--beyaz);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
            text-align: center;
            position: relative;
            animation: cardFadeIn 0.6s ease-out backwards;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .photo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--altin), var(--mavi), var(--altin));
            z-index: 1;
        }

        .photo-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #e8e8e8;
            transition: transform 0.5s ease;
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        .info {
            padding: 25px;
            position: relative;
        }

        .info h3 {
            margin: 10px 0;
            font-size: 1.3rem;
            color: var(--ana-renk);
            font-weight: 600;
        }

        .branch {
            display: inline-block;
            background: linear-gradient(135deg, var(--ana-renk), var(--mavi));
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(26, 42, 108, 0.2);
        }

        .branch.memur {
            background: linear-gradient(135deg, #e67e22, #e8931f);
        }

        .branch.hizmetli {
            background: linear-gradient(135deg, #7f8c8d, #95a5a6);
        }

        .joke-text {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            transition: color 0.3s ease;
        }

        body.dark-mode .joke-text {
            color: #bbb;
            border-top-color: #333;
        }

        .photo-card:hover .joke-text {
            color: var(--mavi);
        }

        /* BEĞENI BUTONU */
        .like-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .like-btn:hover {
            transform: scale(1.15);
            background: var(--kirmizi);
            color: white;
        }

        .like-btn.liked {
            background: var(--kirmizi);
            color: white;
        }

        body.dark-mode .like-btn {
            background: var(--koyu-card);
            color: var(--altin);
        }

        /* MESAJ KUTUSU */
        .message-box {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1), rgba(52, 152, 219, 0.1));
            border-left: 5px solid var(--kirmizi);
            padding: 30px;
            margin: 50px 0;
            border-radius: 8px;
            text-align: center;
            animation: slideInLeft 0.8s ease-out;
        }

        .message-box h3 {
            color: var(--kirmizi);
            font-size: 1.4rem;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }

        .message-box p {
            color: #2d3436;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        body.dark-mode .message-box p {
            color: var(--koyu-text);
        }

        /* SAYAÇ BÖLÜMÜ */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 50px 0;
            text-align: center;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--ana-renk), var(--mavi));
            color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(26, 42, 108, 0.2);
            transition: all 0.3s;
            animation: statPop 0.6s ease-out backwards;
        }

        @keyframes statPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 10px;
        }

        footer {
            background: linear-gradient(135deg, #2d3436, #1a2a6c);
            color: white;
            padding: 50px 20px;
            text-align: center;
            margin-top: 70px;
            border-top: 3px solid var(--altin);
        }

        footer p {
            margin: 10px 0;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        footer .footer-heart {
            color: var(--kirmizi);
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
            margin: 0 5px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* INSTAGRAM BÖLÜMÜ */
        .instagram-section {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(26, 42, 108, 0.1), rgba(52, 152, 219, 0.1));
            border-radius: 12px;
            margin: 50px 0;
            animation: fadeInUp 0.8s ease-out;
        }

        .instagram-section h3 {
            color: var(--ana-renk);
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        body.dark-mode .instagram-section h3 {
            color: var(--altin);
        }

        .instagram-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #E4405F, #833AB4);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(228, 64, 95, 0.3);
        }

        .instagram-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(228, 64, 95, 0.5);
        }

        .instagram-btn i {
            font-size: 1.5rem;
        }

        /* ANILI FOTOĞRAF GALERİSİ */
        .memory-section {
            margin: 60px 0;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .memory-card {
            background: var(--beyaz);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            animation: cardFadeIn 0.6s ease-out backwards;
        }

        body.dark-mode .memory-card {
            background: var(--koyu-card);
        }

        .memory-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .memory-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #e8e8e8;
            transition: transform 0.5s ease;
        }

        .memory-card:hover img {
            transform: scale(1.08);
        }

        .memory-info {
            padding: 20px;
        }

        .memory-date {
            display: inline-block;
            background: linear-gradient(135deg, var(--altin), #d4a017);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .memory-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--ana-renk);
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }

        body.dark-mode .memory-title {
            color: var(--altin);
        }

        .memory-description {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
        }

        body.dark-mode .memory-description {
            color: #bbb;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            header .subtitle { font-size: 1rem; }
            .section-title { font-size: 1.5rem; }
            .gallery-grid { grid-template-columns: 1fr; }
            .memory-grid { grid-template-columns: 1fr; }
            .stats-section { grid-template-columns: 1fr; }
            .quick-menu { display: none; }
            .theme-switcher { top: 10px; right: 10px; }
            .scroll-to-top { bottom: 20px; right: 20px; }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--g
